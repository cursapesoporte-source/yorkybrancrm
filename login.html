<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | YORKY CRM</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="brand-grain-bg" aria-hidden="true">
    <div class="brand-grain-layer brand-grain-layer-one"></div>
    <div class="brand-grain-layer brand-grain-layer-two"></div>
    <div class="brand-grain-layer brand-grain-layer-three"></div>
  </div>

  <main class="login-page">
    <section class="login-card">
      <div class="login-brand">
        <a href="./login.html" class="brand-mark" aria-label="NICO">
          <img
            src="./assets/logo-nico.png"
            alt="NICO"
            class="brand-logo-img brand-logo-login"
            width="320"
            height="84"
          />
        </a>
        <p>Acceso privado de YORKY STORE</p>
      </div>

      <form id="loginForm" class="login-form">
        
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          autocomplete="email"
          required
        />

        
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
          autocomplete="current-password"
          required
        />

        <button type="submit" class="primary-btn">Iniciar sesión</button>
        <p id="loginMessage" class="form-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
